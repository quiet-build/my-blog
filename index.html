<!DOCTYPE html>
<html lang="en-US" class="color-scheme-unset">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/favicon.png" />
    <link rel="alternate" type="application/rss+xml" title="RSS 2.0" href="/feed" />

    <!-- Font preloads (sans-serif) -->
    <link
      rel="preload"
      href="/fonts/IBMPlexSansVar-Roman.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="/fonts/IBMPlexSansVar-Italic.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />

    <!-- Theme color meta tags for auto appearance -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#18181B" media="(prefers-color-scheme: dark)" />

    <!-- Initial background color to prevent flash -->
    <style>
      .color-scheme-unset, .color-scheme-unset body {
        background-color: #ffffff !important;
      }
      @media (prefers-color-scheme: dark) {
        .color-scheme-unset, .color-scheme-unset body {
          background-color: #18181B !important;
        }
      }
    </style>

    <!-- Inline script for initial dark mode detection -->
    <script>
      (function () {
        var stored = localStorage.getItem('darkMode');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var isDark = stored === 'true' || (stored === null && prefersDark);
        var html = document.documentElement;
        html.classList.remove('color-scheme-unset');
        if (isDark) {
          html.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body class="bg-day dark:bg-night">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
